  <style>
    /* ---------- RESET & VARIABLES ---------- */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-color: #f8f9fa;
      --card-bg: #ffffff;
      --text: #1a1a1a;
      --text-light: #666666;
      --primary: #0067c0;
      --primary-hover: #0056a3;
      --overlay-start: rgba(0, 122, 204, 0.9);
      --overlay-end: rgba(0, 181, 204, 0.9);
      --border-radius: 16px;
      --shadow: 0 8px 24px rgba(0,0,0,0.12);
      --shadow-hover: 0 16px 40px rgba(0,0,0,0.2);
    }

    body.dark {
      --bg-color: #0f0f0f;
      --card-bg: #1a1a1a;
      --text: #f5f5f5;
      --text-light: #b0b0b0;
      --overlay-start: rgba(0, 100, 180, 0.9);
      --overlay-end: rgba(0, 150, 180, 0.9);
    }

    body.luxury {
      --bg-color: #0a0a0a;
      --card-bg: #121212;
      --text: #f5f5f5;
      --text-light: #d0d0d0;
      --primary: #c9a66b;
      --primary-hover: #a67c00;
      --overlay-start: rgba(201, 166, 107, 0.9);
      --overlay-end: rgba(166, 124, 0, 0.9);
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-color);
      color: var(--text);
      line-height: 1.6;
      transition: background 0.3s, color 0.3s;
      overflow-x: hidden;
      font-size: 15px;
    }

    /* ---------- SCROLL INDICATOR ---------- */
    #scrollProgress {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), #00b5cc);
      width: 0%;
      z-index: 9999;
      transition: width 0.2s;
    }

    /* ---------- APP BAR ---------- */
    .app-bar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: var(--bg-color);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      flex-wrap: wrap;
    }
    body.dark .app-bar {
      border-bottom-color: rgba(255,255,255,0.05);
    }

    .logo {
      font-weight: 800;
      font-size: 1.6rem;
      color: var(--primary);
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }

    /* ---------- SEARCH BAR ---------- */
    .search-wrapper {
      position: relative;
      flex: 1;
      max-width: 400px;
      min-width: 200px;
    }

    .search-icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-light);
      font-size: 0.9rem;
      pointer-events: none;
      transition: color 0.3s ease;
    }

    .search-wrapper.focused .search-icon {
      animation: searchPulse 0.6s ease;
      color: var(--primary);
    }

    @keyframes searchPulse {
      0% {
        transform: translateY(-50%) scale(1) rotate(0deg);
      }
      50% {
        transform: translateY(-50%) scale(1.2) rotate(-15deg);
      }
      100% {
        transform: translateY(-50%) scale(1) rotate(0deg);
      }
    }

    .search-input {
      width: 100%;
      padding: 10px 40px 10px 12px;
      border: 1.5px solid rgba(0,0,0,0.1);
      border-radius: 25px;
      font-size: 0.9rem;
      font-family: inherit;
      background: var(--card-bg);
      color: var(--text);
      transition: all 0.3s ease;
    }
    .search-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0, 103, 192, 0.1);
    }
    body.dark .search-input {
      border-color: rgba(255,255,255,0.1);
    }
    body.dark .search-input:focus {
      box-shadow: 0 0 0 3px rgba(0, 155, 240, 0.15);
    }

    .clear-btn {
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-light);
      cursor: pointer;
      padding: 4px 8px;
      font-size: 0.8rem;
      transition: color 0.2s ease;
    }
    .clear-btn:hover {
      color: var(--text);
    }

    .card.hidden {
      display: none;
    }

    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
      font-size: 1.1rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .control-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 1.2rem;
      transition: background 0.2s, color 0.2s;
    }
    body.dark .control-btn,
    body.luxury .control-btn {
      color: #aaa;
    }
    .control-btn:hover {
      background: rgba(0,0,0,0.05);
    }
    body.dark .control-btn:hover,
    body.luxury .control-btn:hover {
      background: rgba(255,255,255,0.05);
    }

    /* ---------- GRID ---------- */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 28px;
      max-width: 1400px;
      margin: 40px auto;
      padding: 0 24px;
    }
    @media (max-width: 600px) {
      .image-grid {
        grid-template-columns: 1fr;
        gap: 20px;
        padding: 0 16px;
        margin: 32px auto;
      }
    }

    /* ---------- CARD ---------- */
    .card {
      position: relative;
      border-radius: var(--border-radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: box-shadow 0.3s ease;
      opacity: 0;
      transform: translateY(20px);
    }
    @media (prefers-reduced-motion: reduce) {
      .card { transition: none !important; }
    }
    .card.animate {
      opacity: 1;
      transform: translateY(0);
    }

    .card img {
      display: block;
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      background: linear-gradient(90deg, #e8e8e8 25%, #d8d8d8 50%, #e8e8e8 75%);
      background-size: 200% 100%;
      animation: shimmer 2s infinite;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--overlay-start), var(--overlay-end));
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      color: #fff;
      font-weight: 800;
      font-size: 1.3rem;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      transition: opacity 0.3s ease;
    }

    .badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: var(--primary);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: bold;
      z-index: 2;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    body.luxury .badge {
      background: linear-gradient(135deg, #c9a66b, #a67c00);
    }

    .card-label {
      margin-top: 14px;
      font-weight: 700;
      text-align: center;
      color: var(--text);
      font-size: 1.1rem;
      letter-spacing: 0.3px;
      line-height: 1.4;
    }

    /* ---------- DETAIL VIEW ---------- */
    .detail-view {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0);
      z-index: 3000;
      display: flex;
      opacity: 0;
      pointer-events: none;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(0px);
    }
    .detail-view.show {
      opacity: 1;
      pointer-events: auto;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(15px);
    }

    .detail-image {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      background: var(--bg-color);
      transition: background 0.3s;
    }

    .detail-image img {
      max-width: 100%;
      max-height: 80vh;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      border-radius: var(--border-radius);
      transform: scale(0.7) translateY(50px);
      opacity: 0;
      transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s ease;
    }

    .detail-view.show .detail-image img {
      transform: scale(1) translateY(0);
      opacity: 1;
    }

    .detail-info {
      flex: 1;
      min-width: 0;
      padding: 48px;
      display: flex;
      flex-direction: column;
      background: var(--card-bg);
      transform: translateX(50px);
      opacity: 0;
      transition: all 0.5s ease 0.1s;
      max-height: 100vh;
      overflow-y: auto;
    }
    .detail-view.show .detail-info {
      transform: translateX(0);
      opacity: 1;
    }

    .detail-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    .detail-btn {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      flex: 1;
      font-size: 0.95rem;
    }
    .go-btn {
      background: var(--primary);
      color: white;
    }
    .go-btn:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0, 103, 192, 0.3);
    }
    .share-btn, .copy-btn {
      background: #6c757d;
      color: white;
    }
    .share-btn:hover, .copy-btn:hover {
      background: #5a6268;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.2);
    }

    .close-btn {
      align-self: flex-start;
      margin-bottom: 20px;
      background: none;
      border: none;
      font-size: 1.8rem;
      color: var(--text-light);
      cursor: pointer;
      transition: color 0.2s ease;
    }
    .close-btn:hover {
      color: var(--text);
    }

    .detail-title {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 16px;
      color: var(--text);
    }
    .detail-desc {
      color: var(--text-light);
      line-height: 1.8;
      margin-bottom: 28px;
      flex: 1;
      font-size: 1rem;
    }

    /* ---------- ANIMATIONS ---------- */
    @keyframes glow {
      0% { box-shadow: 0 0 10px rgba(119, 119, 119, 0.25); }
      50% { box-shadow: 0 0 20px rgba(7, 50, 56, 0.8), 0 0 30px var(--overlay-start); }
      100% { box-shadow: 0 0 10px rgba(163, 193, 212, 0.212); }
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      border: 0;
    }

    .card, .detail-btn, .control-btn {
      touch-action: manipulation;
    }

    /* ---------- RESPONSIVE DETAIL VIEW ---------- */
    @media (max-width: 768px) {
      .app-bar {
        flex-direction: column;
        gap: 12px;
        padding: 12px 16px;
      }

      .logo {
        font-size: 1.3rem;
        width: 100%;
      }

      .search-wrapper {
        width: 100%;
        max-width: none;
      }

      .detail-view {
        flex-direction: column;
      }

      .detail-image {
        min-height: 50vh;
        padding: 32px 20px;
        flex-basis: auto;
      }

      .detail-info {
        padding: 32px 20px;
        flex-basis: auto;
        max-height: 50vh;
      }

      .detail-title {
        font-size: 1.6rem;
      }

      .detail-desc {
        font-size: 0.95rem;
      }

      .detail-actions {
        flex-direction: column;
      }

      .detail-btn {
        padding: 14px 16px;
      }
    }
  </style>
</head>

    ];

    // ---------- BADGE OPTIONS ----------
    const badges = ['جديد', 'شائع', 'مميز'];

    // ---------- INJECT CARDS ----------
    const grid = document.getElementById('imageGrid');
    pages.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.index = i;
      card.tabIndex = 0;
      card.setAttribute('role', 'button');
      card.setAttribute('aria-label', `فتح تفاصيل ${p.label}`);

      let badgeHTML = '';
      if (Math.random() > 0.7) {
        const randomBadge = badges[Math.floor(Math.random() * badges.length)];
        badgeHTML = `<div class="badge">${randomBadge}</div>`;
      }

      card.innerHTML = `
        <img src="${p.img.trim()}" alt="${p.label}" loading="lazy" decoding="async"
             onerror="this.parentElement.classList.add('error'); this.src='data:image/svg+xml;utf8,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;200&quot; height=&quot;200&quot;><rect width=&quot;100%&quot; height=&quot;100%&quot; fill=&quot;%23eee&quot;/><path d=&quot;M50,50 L150,150 M150,50 L50,150&quot; stroke=&quot;%23999&quot; stroke-width=&quot;2&quot;/></svg>';">
        <div class="overlay"><span>معاينة</span></div>
        ${badgeHTML}
        <div class="card-label">${p.label}</div>
      `;
      grid.appendChild(card);
    });

    // ---------- INTERSECTION OBSERVER ----------
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('animate');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.card').forEach(card => observer.observe(card));

    // ---------- SCROLL INDICATOR ----------
    window.addEventListener('scroll', () => {
      const scrollTop = window.scrollY;
      const docHeight = document.body.scrollHeight - window.innerHeight;
      const scrollPercent = (scrollTop / docHeight) * 100;
      document.getElementById('scrollProgress').style.width = `${scrollPercent}%`;
    });

    // ---------- SEARCH FUNCTIONALITY ----------
    const searchInput = document.getElementById('searchInput');
    const clearSearch = document.getElementById('clearSearch');
    const noResults = document.getElementById('noResults');
    const searchWrapper = searchInput.parentElement;

    // أضف انميشن عند التركيز على البحث
    searchInput.addEventListener('focus', () => {
      searchWrapper.classList.add('focused');
    });

    searchInput.addEventListener('blur', () => {
      searchWrapper.classList.remove('focused');
    });

    function filterCards() {
      const searchTerm = searchInput.value.toLowerCase().trim();
      const cards = document.querySelectorAll('.card');
      let visibleCount = 0;

      cards.forEach(card => {
        const label = card.querySelector('.card-label').textContent.toLowerCase();
        const desc = pages[card.dataset.index]?.desc?.toLowerCase() || '';
        
        const matches = label.includes(searchTerm) || desc.includes(searchTerm);
        
        if (searchTerm === '') {
          card.classList.remove('hidden');
          card.style.display = '';
          visibleCount++;
        } else if (matches) {
          card.classList.remove('hidden');
          card.style.display = '';
          visibleCount++;
        } else {
          card.classList.add('hidden');
          card.style.display = 'none';
        }
      });

      // عرض رسالة عدم وجود نتائج
      if (searchTerm && visibleCount === 0) {
        noResults.style.display = 'block';
      } else {
        noResults.style.display = 'none';
      }

      // عرض/إخفاء زر المسح
      clearSearch.style.display = searchTerm ? 'flex' : 'none';
    }

    searchInput.addEventListener('input', filterCards);
    clearSearch.addEventListener('click', () => {
      searchInput.value = '';
      searchInput.focus();
      filterCards();
    });

    // ---------- META TAGS UPDATE ----------
    function updateMetaTags(page) {
      const metaTitle = document.querySelector('meta[property="og:title"]');
      const metaDesc = document.querySelector('meta[property="og:description"]');
      const metaImage = document.querySelector('meta[property="og:image"]');
      const metaUrl = document.querySelector('meta[property="og:url"]');

      if (metaTitle) metaTitle.setAttribute('content', page.label);
      if (metaDesc) metaDesc.setAttribute('content', page.desc);
      if (metaImage) metaImage.setAttribute('content', page.img.trim());
      if (metaUrl) metaUrl.setAttribute('content', window.location.href);

      document.title = `${page.label} - الشركات أو المؤسسات`;
    }

    // ---------- DETAIL VIEW ----------
    const detailView = document.getElementById('detailView');
    const detailImg = document.getElementById('detailImg');
    const detailTitle = document.getElementById('detailTitle');
    const detailDesc = document.getElementById('detailDesc');
    const goToPageBtn = document.getElementById('goToPageBtn');
    const shareBtn = document.getElementById('shareBtn');
    const copyBtn = document.getElementById('copyBtn');
    const closeDetail = document.getElementById('closeDetail');

    let currentUrl = '';
    let currentPreviewIndex = null;

    function openDetailView(index) {
      const p = pages[index];
      detailImg.style.opacity = '0';
      detailImg.style.transform = 'scale(0.7) translateY(50px)';
      detailImg.src = p.img.trim();
      detailTitle.textContent = p.label;
      detailDesc.textContent = p.desc;
      currentUrl = p.url;
      currentPreviewIndex = index;
      
      // تحديث Meta Tags
      updateMetaTags(p);
      
      detailView.classList.add('show');
      document.body.style.overflow = 'hidden';
      
      setTimeout(() => {
        detailImg.style.opacity = '1';
        detailImg.style.transform = 'scale(1) translateY(0)';
        goToPageBtn.focus();
      }, 50);
    }

    function closeDetailView() {
      detailView.classList.remove('show');
      document.body.style.overflow = '';
      setTimeout(() => {
        detailImg.style.transform = 'scale(0.7) translateY(50px)';
        detailImg.style.opacity = '0';
      }, 400);
    }

    // ---------- AUTO-OPEN PREVIEW FROM URL ----------
    window.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const previewIndex = urlParams.get('preview');
      if (previewIndex !== null && !isNaN(previewIndex)) {
        const idx = parseInt(previewIndex);
        if (idx >= 0 && idx < pages.length) {
          setTimeout(() => {
            openDetailView(idx);
            // لا حاجة لتغيير الرابط لأنه موجود بالفعل
          }, 800);
        }
      }
    });

    // ---------- CARD CLICK HANDLERS ----------
    document.querySelectorAll('.card').forEach((card, i) => {
      card.addEventListener('click', () => {
        // Micro-interaction sound
        if (typeof AudioContext !== 'undefined') {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = 300;
          gain.gain.value = 0.05;
          osc.start();
          setTimeout(() => { osc.stop(); }, 100);
        }
        openDetailView(i);
      });
      card.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          openDetailView(i);
        }
      });
    });

    closeDetail.addEventListener('click', closeDetailView);
    detailView.addEventListener('click', e => {
      if (e.target === detailView) closeDetailView();
    });

    goToPageBtn.addEventListener('click', () => {
      if (/^[\w\/._-]+\.html$/i.test(currentUrl)) {
        window.location.href = currentUrl;
      }
    });

    // ---------- SHARE & COPY BUTTONS ----------
    shareBtn.addEventListener('click', async () => {
      const shareUrl = `${window.location.origin}${window.location.pathname}?preview=${currentPreviewIndex}`;
      try {
        await navigator.share({
          title: detailTitle.textContent,
          url: shareUrl
        });
      } catch (err) {
        console.log('Sharing failed or not supported', err);
      }
    });

    copyBtn.addEventListener('click', () => {
      const shareUrl = `${window.location.origin}${window.location.pathname}?preview=${currentPreviewIndex}`;
      navigator.clipboard.writeText(shareUrl)
        .then(() => {
          const originalText = copyBtn.textContent;
          copyBtn.textContent = 'تم النسخ!';
          setTimeout(() => copyBtn.textContent = originalText, 2000);
        });
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && detailView.classList.contains('show')) {
        closeDetailView();
      }
    });
  </script>

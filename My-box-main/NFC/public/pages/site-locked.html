<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="صفحة خطأ 403 - ممنوع الوصول">
    <title>403 - ممنوع الوصول</title>
    <style>
        :root {
            --primary: #3498db;
            --primary-hover: #2980b9;
            --secondary-bg: #e9ecef;
            --secondary-hover: #dee2e6;
            --error-color: #e74c3c;
            --text-main: #2c3e50;
            --text-muted: #6c757d;
            --bg-page: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-page);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* عمق بصري خفيف بدلاً من البطاقة */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 15% 50%, rgba(52, 152, 219, 0.08), transparent 25%),
                        radial-gradient(circle at 85% 50%, rgba(231, 76, 60, 0.08), transparent 25%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            text-align: center;
            max-width: 700px;
            width: 100%;
            padding: 2rem;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .lock-icon {
            margin-bottom: 1rem;
            display: inline-block;
            color: var(--error-color);
        }

        .lock-icon svg { width: 64px; height: 64px; }

        .error-code {
            font-size: 6.5rem;
            font-weight: 800;
            color: var(--error-color);
            line-height: 1;
            margin-bottom: 0.5rem;
            letter-spacing: -2px;
        }

        h1 {
            font-size: 1.75rem;
            margin-bottom: 0.75rem;
            color: var(--text-main);
        }

        p {
            font-size: 1.05rem;
            color: var(--text-muted);
            margin: 0 auto 2.5rem;
            line-height: 1.7;
            max-width: 520px;
        }

        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0.85rem 2rem;
            background: var(--primary);
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .btn svg { width: 18px; height: 18px; }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.25);
        }

        .btn.secondary {
            background: transparent;
            border-color: var(--secondary-bg);
            color: var(--text-main);
        }

        .btn.secondary:hover {
            background: var(--secondary-bg);
            border-color: var(--secondary-hover);
            transform: translateY(-2px);
        }

        @media (max-width: 480px) {
            .error-code { font-size: 4.5rem; }
            h1 { font-size: 1.4rem; }
            .actions { flex-direction: column; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="lock-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
        </div>
        <div class="error-code">403</div>
        <h1>ممنوع الوصول</h1>
        <p>عذراً، ليس لديك الصلاحيات الكافية لعرض هذه الصفحة.<br>
        إذا كنت تعتقد أن هذا خطأ، يرجى التواصل مع مسؤول الموقع أو التحقق من بيانات الدخول.</p>
        
        <div class="actions">
            <a href="/" class="btn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                العودة للرئيسية
            </a>
            <a href="javascript:history.back()" class="btn secondary">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
                الرجوع للخلف
            </a>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دليل المأكولات والمقاهي</title>
  
  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="الشركات أو المؤسسات">
  <meta property="og:description" content="استعرض الشركات والمؤسسات المتاحة">
  <meta property="og:image" content="https://i.ibb.co/SHz0cgT/feeab8fae463fbe3ef45a9223fd295bd.jpg">
  <meta property="og:url" content="https://yourdomain.com/">
  <meta property="og:type" content="website">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ---------- RESET & VARIABLES ---------- */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-color: #f8f9fa;
      --card-bg: #ffffff;
      --text: #2d3748;
      --text-muted: #718096;
      --primary: #dd6b20; /* لون برتقالي دافئ يناسب المطاعم والمقاهي */
      --primary-hover: #c05621;
      --border-radius: 20px;
      --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-color);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ---------- SCROLL INDICATOR ---------- */
    #scrollProgress {
      position: fixed;
      top: 0;
      left: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), #ed8936);
      width: 0%;
      z-index: 9999;
      transition: width 0.1s ease;
    }

    /* ---------- APP BAR & SEARCH ---------- */
    .app-bar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }

    @media (min-width: 768px) {
      .app-bar {
        flex-direction: row;
        justify-content: space-between;
      }
    }

    .logo {
      font-weight: 900;
      font-size: 1.6rem;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* حقل البحث الجديد */
    .search-wrapper {
      position: relative;
      width: 100%;
      max-width: 450px;
    }

    .search-input {
      width: 100%;
      padding: 12px 48px 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 50px;
      font-size: 0.95rem;
      font-family: inherit;
      background: #f7fafc;
      transition: var(--transition);
      color: var(--text);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(221, 107, 32, 0.15);
    }

    .search-icon {
      position: absolute;
      top: 50%;
      right: 18px;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1.1rem;
      pointer-events: none;
      transition: var(--transition);
    }
    .search-input:focus + .search-icon {
      color: var(--primary);
    }

    /* أزرار الفلترة السريعة */
    .filter-tags {
      display: flex;
      gap: 8px;
      max-width: 1200px;
      margin: 20px auto 0 auto;
      padding: 0 20px;
      overflow-x: auto;
      white-space: nowrap;
    }
    .filter-tags::-webkit-scrollbar { display: none; }

    .tag-btn {
      padding: 6px 16px;
      border: 1px solid #e2e8f0;
      background: #fff;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text-muted);
      transition: var(--transition);
    }
    .tag-btn.active, .tag-btn:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* ---------- GRID ---------- */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 30px;
      max-width: 1200px;
      margin: 20px auto 40px auto;
      padding: 0 20px;
    }

    /* ---------- CARD ---------- */
    .card {
      position: relative;
      background: var(--card-bg);
      border-radius: var(--border-radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: var(--transition);
      opacity: 0;
      transform: translateY(30px);
      display: flex;
      flex-direction: column;
    }

    .card.animate {
      opacity: 1;
      transform: translateY(0);
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }

    .card-img-container {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      overflow: hidden;
      background: #edf2f7;
    }

    .card img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .card:hover img {
      transform: scale(1.08);
    }

    .badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      color: white;
      padding: 4px 14px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: bold;
      z-index: 2;
    }

    .badge.new { background: #2f855a; }
    .badge.popular { background: #c53030; }
    .badge.featured { background: #b7791f; }

    .card-body {
      padding: 16px;
      text-align: right;
    }

    .card-label {
      font-weight: 700;
      color: var(--text);
      font-size: 1.15rem;
      margin-bottom: 4px;
    }

    .card-subtext {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* ---------- DETAIL VIEW ---------- */
    .detail-view {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0);
      z-index: 3000;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: all 0.4s ease;
      backdrop-filter: blur(0px);
      -webkit-backdrop-filter: blur(0px);
      overflow-y: auto;
    }

    @media (min-width: 768px) {
      .detail-view {
        flex-direction: row;
      }
    }

    .detail-view.show {
      opacity: 1;
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
    }

    .detail-image {
      flex: 1.2;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .detail-image img {
      max-width: 100%;
      max-height: 70vh;
      object-fit: contain;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      border-radius: var(--border-radius);
      transform: scale(0.9) translateY(30px);
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .detail-view.show .detail-image img {
      transform: scale(1) translateY(0);
      opacity: 1;
    }

    .detail-info {
      flex: 1;
      padding: 40px 30px;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      transform: translateX(100px);
      opacity: 0;
      transition: all 0.4s ease 0.1s;
    }

    @media (max-width: 767px) {
      .detail-info {
        transform: translateY(100px);
        border-radius: 30px 30px 0 0;
      }
      .detail-view.show .detail-info {
        transform: translateY(0);
      }
    }

    .detail-view.show .detail-info {
      transform: translateX(0);
      opacity: 1;
    }

    .close-btn {
      align-self: flex-start;
      background: #edf2f7;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 1.2rem;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      margin-bottom: 24px;
    }
    .close-btn:hover { background: #e2e8f0; }

    .detail-title {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 12px;
      color: var(--text);
    }

    .detail-desc {
      color: var(--text-muted);
      line-height: 1.8;
      margin-bottom: 30px;
      flex: 1;
    }

    .detail-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    @media (min-width: 480px) {
      .detail-actions { flex-direction: row; }
    }

    .detail-btn {
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.95rem;
      flex: 1;
    }

    .go-btn { background: var(--primary); color: white; }
    .go-btn:hover { background: var(--primary-hover); }
    .share-btn { background: #edf2f7; color: var(--text); }
    .share-btn:hover { background: #e2e8f0; }
    .copy-btn { background: #edf2f7; color: var(--text); }
    .copy-btn:hover { background: #e2e8f0; }

    /* وضع عدم العثور على نتائج */
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 1.2rem;
    }
    .no-results i {
      font-size: 3rem;
      margin-bottom: 16px;
      color: #cbd5e0;
      display: block;
    }
  </style>
</head>
<body>
  <div id="scrollProgress"></div>
  
  <header class="app-bar">
    <div class="logo">
      <i class="fas fa-utensils"></i> 
      <span>دليل الضيافة</span>
    </div>
    <!-- حقل البحث الذكي -->
    <div class="search-wrapper">
      <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن صفحة، مطعم أو مقهى...">
      <i class="fas fa-search search-icon"></i>
    </div>
  </header>

  <!-- فلاتر التصفح السريع -->
  <div class="filter-tags">
    <button class="tag-btn active" data-filter="all">الكل</button>
    <button class="tag-btn" data-filter="جديد">جديد ✨</button>
    <button class="tag-btn" data-filter="شائع">شائع 🔥</button>
    <button class="tag-btn" data-filter="مميز">مميز 🌟</button>
    <button class="tag-btn" data-filter="معتاد">معتاد ⭐</button>
  </div>

  <main id="imageGrid" class="image-grid" aria-label="معرض الشركات"></main>

  <!-- نافذة التفاصيل المبثوقة -->
  <div class="detail-view" id="detailView" role="dialog" aria-modal="true">
    <div class="detail-image">
      <img id="detailImg" alt="" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;200&quot; height=&quot;200&quot;><rect width=&quot;100%&quot; height=&quot;100%&quot; fill=&quot;%23eee&quot;/><path d=&quot;M50,50 L150,150 M150,50 L50,150&quot; stroke=&quot;%23999&quot; stroke-width=&quot;2&quot;/></svg>';">
    </div>
    <div class="detail-info">
      <button class="close-btn" id="closeDetail" aria-label="إغلاق"><i class="fas fa-times"></i></button>
      <h2 class="detail-title" id="detailTitle"></h2>
      <p class="detail-desc" id="detailDesc"></p>
      <div class="detail-actions">
        <button class="detail-btn go-btn" id="goToPageBtn"><i class="fas fa-external-link-alt"></i> زيارة الصفحة</button>
        <button class="detail-btn share-btn" id="shareBtn"><i class="fas fa-share-alt"></i> مشاركة</button>
        <button class="detail-btn copy-btn" id="copyBtn"><i class="fas fa-link"></i> نسخ</button>
      </div>
    </div>
  </div>

  <script>
    // ---------- DATA ----------
    // تم إضافة خاصية الفئة (category) والوصف لكل صفحة لمنع ظهور الخطأ السابق وتفعيل البحث الذكي
    const pages = [
      { img: "https://i.ibb.co/8nRP1XQc/d49fcc548df3c675843b01c1382680f9.jpg", url: "page1.html", label: "مقهى ومحمصة أروما", desc: "استمتع بألذ أنواع القهوة المختصة والحلويات الغربية في أجواء هادئة ومميزة تناسب العمل واللقاءات.", category: "جديد" },
      { img: "https://i.ibb.co/cK3YW16P/a22f94486324c56acd0b7d78de38dcaa.jpg", url: "page2.html", label: "مطعم البرجر المبتكر", desc: "نقدم لك تجربة برجر فريدة من نوعها مع لحوم طازجة 100% وصلصات سرية تُحضر يومياً خصيصاً لك.", category: "شائع" },
      { img: "https://i.ibb.co/7JqYfkkH/b8991a4e264ae70eea7a692dc665c380.jpg", url: "page3.html", label: "مقهى إطلالة المساء", desc: "المكان الأمثل لقضاء أوقات لا تُنسى مع العائلة والأصدقاء تحت أضواء خافتة وإطلالة ساحرة.", category: "مميز" },
      { img: "https://i.ibb.co/j9R1Vzn7/00c73bb5c9a22e2a2802486f2f66751f.jpg", url: "page4.html", label: "مطعم المأكولات الإيطالية", desc: "أصالة البيتزا والباستا الإيطالية المجهزة بالفرن الحجري وعلى أيدي أمهر الطهاة المحترفين.", category: "معتاد" },
      { img: "https://i.ibb.co/6JJ4w2GL/51220d83ef2165ff0a51b05bb2e2e2af.jpg", url: "page5.html", label: "مقهى ومخبز الجمل", desc: "رائحة المخبوزات الطازجة والكرواسون المقرمش مع فنجان من الاسبريسو الصباحي يعدل مزاجك.", category: "جديد" },
      { img: "https://i.ibb.co/tpdx2cQj/f6e737f6e34b45a86ae5f1e504ad886f.jpg", url: "page6.html", label: "مطعم المشويات الشرقية", desc: "تشكيلة واسعة من الكباب والشواء العربي الأصيل بنكهات فريدة ومقبلات شامية غنية.", category: "شائع" },
      { img: "https://g.top4top.io/p_35348e8lg0.jpeg", url: "page7.html", label: "مطعم المأكولات البحرية", desc: "أسماك طازجة وثمار بحرية تُطهى بخلطاتنا الخاصة التي تأخذك في رحلة حول محيطات العالم.", category: "معتاد" },
      { img: "https://h.top4top.io/p_35344qwy91.jpeg", url: "page8.html", label: "مقهى سويت كورنر", desc: "ركن الحلويات والوافل والبانكيك الغني بالشوكولاتة البلجيكية الفاخرة لجميع مناسباتك.", category: "مميز" },
      { img: "https://i.top4top.io/p_3534yuu2d2.jpeg", url: "page9.html", label: "مطعم ومقهى الفطور الأنيق", desc: "ابدأ يومك بفطور متكامل من الأطباق العالمية والمحلية في صالة داخلية راقية ومريحة.", category: "شائع" },
      { img: "https://j.top4top.io/p_3534s4oou3.jpeg", url: "page10.html", label: "الصفحة 10", desc: "تفاصيل وصور مميزة حول هذه المنشأة والخدمات الفريدة التي تقدمها لعملائها الكرام.", category: "معتاد" },
      { img: "https://k.top4top.io/p_3534dxtqd4.jpeg", url: "page11.html", label: "الصفحة 11", desc: "تفاصيل وصور مميزة حول هذه المنشأة والخدمات الفريدة التي تقدمها لعملائها الكرام.", category: "معتاد" },
      { img: "https://l.top4top.io/p_3534t6ca75.jpeg", url: "page12.html", label: "الصفحة 12", desc: "تفاصيل وصور مميزة حول هذه المنشأة والخدمات الفريدة التي تقدمها لعملائها الكرام.", category: "جديد" },
      { img: "https://a.top4top.io/p_35344dpm46.jpeg", url: "page13.html", label: "الصفحة 13", desc: "استكشف هذه الوجهة الجديدة مع صور جذابة وخدمات ممتازة لزوارنا.", category: "معتاد" },
      { img: "https://b.top4top.io/p_353483qyn7.jpeg", url: "page14.html", label: "الصفحة 14", desc: "عرض خاص وتجربة ضيافة مريحة تناسب جميع الأذواق.", category: "جديد" },
      { img: "https://c.top4top.io/p_353412wgh8.jpeg", url: "page15.html", label: "الصفحة 15", desc: "مكان مميز يقدم قائمة طعام متنوعة وخدمة سريعة للزوار.", category: "شائع" },
      { img: "https://d.top4top.io/p_3534qro1r9.jpeg", url: "page16.html", label: "الصفحة 16", desc: "تجربة طعام راقية وتصميم أنيق يضمن لك وقتاً ممتعاً.", category: "مميز" },
      { img: "https://b.top4top.io/p_3534fjmvi0.jpeg", url: "page17.html", label: "الصفحة 17", desc: "قائمة غنية بالمأكولات المفضلة لديك وأجواء جذابة للقاءات العائلية.", category: "معتاد" },
      { img: "https://c.top4top.io/p_3534sahr41.jpeg", url: "page18.html", label: "الصفحة 18", desc: "مكان رائع للاستمتاع بالمشروبات الساخنة والباردة مع أصدقاك.", category: "مميز" },
      { img: "https://d.top4top.io/p_35342v6vw2.jpeg", url: "page19.html", label: "الصفحة 19", desc: "خدمة عملاء ممتازة وأطباق معدّة بعناية لتلبي كل التوقعات.", category: "شائع" },
      { img: "https://e.top4top.io/p_3534cskmo3.jpeg", url: "page20.html", label: "الصفحة 20", desc: "أجواء مميزة ومكان مريح للاستراحة وتناول الطعام.", category: "جديد" },
      { img: "https://f.top4top.io/p_35345jcco4.jpeg", url: "page21.html", label: "الصفحة 21", desc: "تجربة طعام مميزة تناسب رحلاتك اليومية والمناسبات الخاصة.", category: "معتاد" }
      // يمكنك استكمال بقية العناصر الـ 40 بنفس النسق هنا...
    ];

    let activeFilter = 'all';
    let searchQuery = '';

    const grid = document.getElementById('imageGrid');
    const searchInput = document.getElementById('searchInput');
    const filterButtons = document.querySelectorAll('.tag-btn');

    // ---------- INJECT & RENDER CARDS ----------
    function renderCards() {
      grid.innerHTML = '';
      
      // فلترة البيانات بناءً على البحث والتاغات
      const filteredPages = pages.filter(p => {
        const matchesSearch = p.label.toLowerCase().includes(searchQuery.toLowerCase()) || 
                              p.desc.toLowerCase().includes(searchQuery.toLowerCase());
        const matchesFilter = activeFilter === 'all' || p.category === activeFilter;
        return matchesSearch && matchesFilter;
      });

      if (filteredPages.length === 0) {
        grid.innerHTML = `<div class="no-results"><i class="fas fa-search-minus"></i>لم نجد أي نتائج تطابق بحثك، جرب كلمات أخرى!</div>`;
        return;
      }

      filteredPages.forEach((p, index) => {
        // العثور على المؤشر الأصلي في مصفوفة البيانات الأساسية
        const originalIndex = pages.findIndex(item => item.url === p.url);
        
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.index = originalIndex;
        card.tabIndex = 0;
        card.setAttribute('role', 'button');
        card.setAttribute('aria-label', `فتح تفاصيل ${p.label}`);

        // تخصيص لون وتصميم التاغ حسب الفئة
        let badgeHTML = '';
        if (['جديد', 'شائع', 'مميز'].includes(p.category)) {
          let classMap = {'جديد': 'new', 'شائع': 'popular', 'مميز': 'featured'};
          badgeHTML = `<div class="badge ${classMap[p.category]}">${p.category}</div>`;
        }

        card.innerHTML = `
          <div class="card-img-container">
            <img src="${p.img.trim()}" alt="${p.label}" loading="lazy" decoding="async"
                 onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;200&quot; height=&quot;200&quot;><rect width=&quot;100%&quot; height=&quot;100%&quot; fill=&quot;%23eee&quot;/><path d=&quot;M50,50 L150,150 M150,50 L50,150&quot; stroke=&quot;%23999&quot; stroke-width=&quot;2&quot;/></svg>';">
            ${badgeHTML}
          </div>
          <div class="card-body">
            <div class="card-label">${p.label}</div>
            <div class="card-subtext">${p.desc.substring(0, 60)}...</div>
          </div>
        `;

        // عند النقر على البطاقة
        card.addEventListener('click', () => openDetailView(originalIndex));
        card.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            openDetailView(originalIndex);
          }
        });

        grid.appendChild(card);
        
        // تفعيل الأنيميشن تدريجياً
        setTimeout(() => card.classList.add('animate'), 50 * index);
      });
    }

    // ---------- SEARCH & FILTER LISTENERS ----------
    searchInput.addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderCards();
    });

    filterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        filterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        if (activeFilter === 'all') {
          searchQuery = '';
          searchInput.value = '';
        }
        renderCards();
      });
    });

    // ---------- SCROLL INDICATOR ----------
    window.addEventListener('scroll', () => {
      const scrollTop = window.scrollY;
      const docHeight = document.body.scrollHeight - window.innerHeight;
      const scrollPercent = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      document.getElementById('scrollProgress').style.width = `${scrollPercent}%`;
    });

    // ---------- META TAGS UPDATE ----------
    function updateMetaTags(page) {
      const metaTitle = document.querySelector('meta[property="og:title"]');
      const metaDesc = document.querySelector('meta[property="og:description"]');
      const metaImage = document.querySelector('meta[property="og:image"]');
      
      if (metaTitle) metaTitle.setAttribute('content', page.label);
      if (metaDesc) metaDesc.setAttribute('content', page.desc);
      if (metaImage) metaImage.setAttribute('content', page.img.trim());

      document.title = `${page.label} - دليل الضيافة`;
    }

    // ---------- DETAIL VIEW ----------
    const detailView = document.getElementById('detailView');
    const detailImg = document.getElementById('detailImg');
    const detailTitle = document.getElementById('detailTitle');
    const detailDesc = document.getElementById('detailDesc');
    const goToPageBtn = document.getElementById('goToPageBtn');
    const shareBtn = document.getElementById('shareBtn');
    const copyBtn = document.getElementById('copyBtn');
    const closeDetail = document.getElementById('closeDetail');

    let currentUrl = '';
    let currentPreviewIndex = null;

    function openDetailView(index) {
      const p = pages[index];
      detailImg.style.opacity = '0';
      detailImg.style.transform = 'scale(0.9) translateY(30px)';
      detailImg.src = p.img.trim();
      detailTitle.textContent = p.label;
      detailDesc.textContent = p.desc;
      currentUrl = p.url;
      currentPreviewIndex = index;
      
      updateMetaTags(p);
      
      detailView.classList.add('show');
      document.body.style.overflow = 'hidden';
      
      setTimeout(() => {
        detailImg.style.opacity = '1';
        detailImg.style.transform = 'scale(1) translateY(0)';
        goToPageBtn.focus();
      }, 50);
    }

    function closeDetailView() {
      detailView.classList.remove('show');
      document.body.style.overflow = '';
    }

    closeDetail.addEventListener('click', closeDetailView);
    detailView.addEventListener('click', e => {
      if (e.target === detailView) closeDetailView();
    });

    goToPageBtn.addEventListener('click', () => {
      if (currentUrl) window.location.href = currentUrl;
    });

    // ---------- SHARE & COPY BUTTONS ----------
    shareBtn.addEventListener('click', async () => {
      const shareUrl = `${window.location.origin}${window.location.pathname}?preview=${currentPreviewIndex}`;
      try {
        await navigator.share({
          title: detailTitle.textContent,
          text: detailDesc.textContent,
          url: shareUrl
        });
      } catch (err) {
        console.log('مشاركة الروابط غير مدعومة في هذا المتصفح');
      }
    });

    copyBtn.addEventListener('click', () => {
      const shareUrl = `${window.location.origin}${window.location.pathname}?preview=${currentPreviewIndex}`;
      navigator.clipboard.writeText(shareUrl).then(() => {
        const originalText = copyBtn.innerHTML;
        copyBtn.innerHTML = '<i class="fas fa-check"></i> تم النسخ!';
        setTimeout(() => copyBtn.innerHTML = originalText, 2000);
      });
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && detailView.classList.contains('show')) closeDetailView();
    });

    // الفتح التلقائي عند وجود باراميتر في الرابط
    window.addEventListener('DOMContentLoaded', () => {
      renderCards();
      const urlParams = new URLSearchParams(window.location.search);
      const previewIndex = urlParams.get('preview');
      if (previewIndex !== null && !isNaN(previewIndex)) {
        const idx = parseInt(previewIndex);
        if (idx >= 0 && idx < pages.length) {
          setTimeout(() => openDetailView(idx), 500);
        }
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نسيان كلمة المرور - N'dex Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-background-primary: #ffffff;
            --color-background-secondary: #f8fafc;
            --color-background-tertiary: #f1f5f9;
            --color-border-secondary: #e2e8f0;
            --color-text-primary: #0f172a;
            --color-text-secondary: #64748b;
            --color-text-tertiary: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            min-height: 600px;
            display: flex;
            background: var(--color-background-primary);
        }

        .split-screen {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        /* Left Panel */
        .left-panel {
            flex: 1;
            background: #0A0A0F;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .orb-1 {
            position: absolute;
            top: -60px;
            left: -60px;
            width: 280px;
            height: 280px;
            background: #4F46E5;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.35;
        }

        .orb-2 {
            position: absolute;
            bottom: 60px;
            right: -40px;
            width: 200px;
            height: 200px;
            background: #7C3AED;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.35;
        }

        .orb-3 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 160px;
            height: 160px;
            background: #2563EB;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.35;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 2;
        }

        .logo-box {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .logo-text {
            color: white;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .hero-content {
            z-index: 2;
        }

        .hero-title {
            font-weight: 300;
            font-size: 26px;
            color: white;
            line-height: 1.35;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .hero-title .gradient {
            background: linear-gradient(90deg, #818CF8, #C084FC);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            color: rgba(255, 255, 255, 0.45);
            font-size: 13px;
            line-height: 1.6;
        }

        .pagination {
            display: flex;
            gap: 6px;
            z-index: 2;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
        }

        .dot.active {
            width: 20px;
            height: 6px;
            border-radius: 3px;
            background: #818CF8;
        }

        /* Right Panel */
        .right-panel {
            flex: 1.1;
            background: var(--color-background-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .forgot-form {
            max-width: 340px;
            width: 100%;
        }

        .form-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--color-text-primary);
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .form-subtitle {
            font-size: 13px;
            color: var(--color-text-secondary);
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: var(--color-text-secondary);
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            height: 42px;
            padding: 0 14px;
            border: 1px solid var(--color-border-secondary);
            border-radius: 10px;
            background: var(--color-background-secondary);
            font-size: 14px;
            color: var(--color-text-primary);
            outline: none;
            transition: all 0.2s ease;
        }

        .form-input::placeholder {
            color: var(--color-text-tertiary);
        }

        .form-input:focus {
            border-color: #6366F1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
        }

        .reset-btn {
            width: 100%;
            height: 44px;
            border-radius: 10px;
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            color: white;
            border: none;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: -0.2px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 20px;
        }

        .reset-btn:hover {
            opacity: 0.92;
        }

        .reset-btn:active {
            transform: scale(0.98);
        }

        .back-link {
            text-align: center;
            font-size: 13px;
            color: var(--color-text-secondary);
        }

        .back-link a {
            color: #6366F1;
            text-decoration: none;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 520px) {
            .left-panel {
                display: none;
            }

            .right-panel {
                padding: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="split-screen">
        <!-- Left Panel -->
        <div class="left-panel">
            <div class="orb-1"></div>
            <div class="orb-2"></div>
            <div class="orb-3"></div>

            <div class="logo">
                <span class="logo-text">N'dex Card</span>
            </div>

            <div class="hero-content">
                <h1 class="hero-title">
                    استعادة حسابك<br>
                    <span class="gradient">بسهولة</span>
                </h1>
                <p class="hero-subtitle">
                    أدخل بريدك الإلكتروني وسنرسل لك رابط إعادة تعيين كلمة المرور
                </p>
            </div>

            <div class="pagination">
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="right-panel">
            <div class="forgot-form">
                <h2 class="form-title">نسيت كلمة المرور؟</h2>
                <p class="form-subtitle">أدخل بريدك الإلكتروني وسنرسل لك تعليمات الاستعادة</p>

                <form id="forgotForm">
                    <div class="form-group">
                        <label class="form-label" for="resetEmail">البريد الإلكتروني</label>
                        <input type="email" id="resetEmail" name="email" class="form-input" placeholder="أدخل بريدك الإلكتروني" required>
                    </div>

                    <button type="submit" class="reset-btn">إرسال رابط الاستعادة</button>
                </form>

                <p class="back-link">
                    <a href="login.html">العودة إلى تسجيل الدخول</a>
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import {
            getAuth,
            sendPasswordResetEmail
        } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCiwkEOGzJwplGbdGd35oVk-54fMz0T838",
            authDomain: "poch-ntification.firebaseapp.com",
            databaseURL: "https://poch-ntification-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "poch-ntification",
            storageBucket: "poch-ntification.firebasestorage.app",
            messagingSenderId: "169375707704",
            appId: "1:169375707704:web:cff7f29e9bbaf40ea72ccd",
            measurementId: "G-X3C2EDECME"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const forgotForm = document.getElementById('forgotForm');

        const feedbackMessage = document.createElement('div');
        feedbackMessage.style.marginBottom = '16px';
        feedbackMessage.style.fontSize = '13px';
        feedbackMessage.style.color = '#e11d48';
        feedbackMessage.style.display = 'none';
        document.querySelector('.forgot-form').insertBefore(feedbackMessage, forgotForm);

        function showFeedback(message, isError = true) {
            feedbackMessage.textContent = message;
            feedbackMessage.style.display = 'block';
            feedbackMessage.style.color = isError ? '#e11d48' : '#16a34a';
        }

        forgotForm.addEventListener('submit', function(e) {
            e.preventDefault();
            feedbackMessage.style.display = 'none';

            const email = document.getElementById('resetEmail').value;

            sendPasswordResetEmail(auth, email)
                .then(() => {
                    showFeedback('تم إرسال رابط إعادة تعيين كلمة المرور إلى بريدك الإلكتروني!', false);
                })
                .catch((error) => {
                    const code = error.code || '';
                    let message = 'فشل إرسال الرابط';

                    if (code === 'auth/user-not-found') message = 'البريد الإلكتروني غير مسجل.';
                    if (code === 'auth/invalid-email') message = 'البريد الإلكتروني غير صالح.';

                    showFeedback(message, true);
                });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - N'dex Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-background-primary: #ffffff;
            --color-background-secondary: #f8fafc;
            --color-background-tertiary: #f1f5f9;
            --color-border-secondary: #e2e8f0;
            --color-text-primary: #0f172a;
            --color-text-secondary: #64748b;
            --color-text-tertiary: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            min-height: 600px;
            display: flex;
            background: var(--color-background-primary);
        }

        .split-screen {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        /* Left Panel */
        .left-panel {
            flex: 1;
            background: #0A0A0F;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .orb-1 {
            position: absolute;
            top: -60px;
            left: -60px;
            width: 280px;
            height: 280px;
            background: #4F46E5;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.35;
        }

        .orb-2 {
            position: absolute;
            bottom: 60px;
            right: -40px;
            width: 200px;
            height: 200px;
            background: #7C3AED;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.35;
        }

        .orb-3 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 160px;
            height: 160px;
            background: #2563EB;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.35;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 2;
        }

        .logo-box {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .logo-text {
            color: white;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .hero-content {
            z-index: 2;
        }

        .hero-title {
            font-weight: 300;
            font-size: 26px;
            color: white;
            line-height: 1.35;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .hero-title .gradient {
            background: linear-gradient(90deg, #818CF8, #C084FC);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            color: rgba(255, 255, 255, 0.45);
            font-size: 13px;
            line-height: 1.6;
        }

        .pagination {
            display: flex;
            gap: 6px;
            z-index: 2;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
        }

        .dot.active {
            width: 20px;
            height: 6px;
            border-radius: 3px;
            background: #818CF8;
        }

        /* Right Panel */
        .right-panel {
            flex: 1.1;
            background: var(--color-background-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .login-form {
            max-width: 340px;
            width: 100%;
        }

        .form-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--color-text-primary);
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .form-subtitle {
            font-size: 13px;
            color: var(--color-text-secondary);
            margin-bottom: 28px;
        }

        .social-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .social-btn {
            height: 40px;
            border-radius: 10px;
            border: 1px solid var(--color-border-secondary);
            background: var(--color-background-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: background 0.2s ease;
            text-decoration: none;
            color: var(--color-text-primary);
        }

        .social-btn:hover {
            background: var(--color-background-tertiary);
        }

        .social-icon {
            width: 16px;
            height: 16px;
        }

        .social-text {
            font-size: 13px;
            font-weight: 500;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--color-border-secondary);
        }

        .divider-text {
            padding: 0 12px;
            font-size: 12px;
            color: var(--color-text-tertiary);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: var(--color-text-secondary);
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            height: 42px;
            padding: 0 14px;
            border: 1px solid var(--color-border-secondary);
            border-radius: 10px;
            background: var(--color-background-secondary);
            font-size: 14px;
            color: var(--color-text-primary);
            outline: none;
            transition: all 0.2s ease;
        }

        .form-input::placeholder {
            color: var(--color-text-tertiary);
        }

        .form-input:focus {
            border-color: #6366F1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
        }

        .password-group {
            position: relative;
        }

        .forgot-link {
            position: absolute;
            left: 0;
            top: 0;
            font-size: 12px;
            color: #6366F1;
            text-decoration: none;
            font-weight: 500;
        }

        .remember-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .remember-checkbox {
            accent-color: #6366F1;
        }

        .remember-text {
            font-size: 13px;
            color: var(--color-text-secondary);
        }

        .login-btn {
            width: 100%;
            height: 44px;
            border-radius: 10px;
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            color: white;
            border: none;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: -0.2px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 20px;
        }

        .login-btn:hover {
            opacity: 0.92;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .signup-link {
            text-align: center;
            font-size: 13px;
            color: var(--color-text-secondary);
        }

        .signup-link a {
            color: #6366F1;
            text-decoration: none;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 520px) {
            .left-panel {
                display: none;
            }

            .right-panel {
                padding: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="split-screen">
        <!-- Left Panel -->
        <div class="left-panel">
            <div class="orb-1"></div>
            <div class="orb-2"></div>
            <div class="orb-3"></div>

            <div class="logo">
                <span class="logo-text">N'dex Card</span>
            </div>

            <div class="hero-content">
                <h1 class="hero-title">
                    بطاقتك الرقمية<br>
                    <span class="gradient">في ثانية واحدة</span>
                </h1>
                <p class="hero-subtitle">
                    منصة بطاقات الأعمال الذكية / بتقنية NFC الحديثة
                </p>
            </div>

            <div class="pagination">
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="right-panel">
            <div class="login-form">
                <h2 class="form-title">مرحباً بعودتك</h2>
                <p class="form-subtitle">سجّل دخولك للمتابعة</p>

                <div class="social-buttons">
                    <button type="button" id="googleSignIn" class="social-btn">
                        <svg class="social-icon" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        <span class="social-text">Google</span>
                    </button>
                    <button type="button" id="githubSignIn" class="social-btn">
                        <svg class="social-icon" viewBox="0 0 24 24">
                            <path fill="currentColor" d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                        <span class="social-text">GitHub</span>
                    </button>
                </div>

                <div class="divider">
                    <span class="divider-text">أو بالبريد الإلكتروني</span>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label" for="email">البريد الإلكتروني</label>
                        <input type="email" id="email" name="email" class="form-input" placeholder="أدخل بريدك الإلكتروني" required>
                    </div>

                    <div class="form-group">
                        <div class="password-group">
                            <label class="form-label" for="password">كلمة المرور</label>
                            <a href="#" class="forgot-link">نسيت؟</a>
                        </div>
                        <input type="password" id="password" name="password" class="form-input" placeholder="أدخل كلمة المرور" required>
                    </div>

                    <div class="remember-group">
                        <input type="checkbox" id="remember" name="remember" class="remember-checkbox">
                        <label for="remember" class="remember-text">تذكّرني لمدة 30 يومًا</label>
                    </div>

                    <button type="submit" class="login-btn">تسجيل الدخول</button>
                </form>

                <p class="signup-link">
                    ليس لديك حساب؟ <a href="register.html">أنشئ حسابًا مجانًا</a>
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import {
            getAuth,
            signInWithEmailAndPassword,
            signInWithPopup,
            GoogleAuthProvider,
            GithubAuthProvider,
            onAuthStateChanged,
            setPersistence,
            browserLocalPersistence,
            browserSessionPersistence
        } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCiwkEOGzJwplGbdGd35oVk-54fMz0T838",
            authDomain: "poch-ntification.firebaseapp.com",
            databaseURL: "https://poch-ntification-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "poch-ntification",
            storageBucket: "poch-ntification.firebasestorage.app",
            messagingSenderId: "169375707704",
            appId: "1:169375707704:web:cff7f29e9bbaf40ea72ccd",
            measurementId: "G-X3C2EDECME"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();
        const githubProvider = new GithubAuthProvider();

        const loginForm = document.getElementById('loginForm');
        const googleSignInBtn = document.getElementById('googleSignIn');
        const githubSignInBtn = document.getElementById('githubSignIn');

        const feedbackMessage = document.createElement('div');
        feedbackMessage.style.marginBottom = '16px';
        feedbackMessage.style.fontSize = '13px';
        feedbackMessage.style.color = '#e11d48';
        feedbackMessage.style.display = 'none';
        document.querySelector('.login-form').insertBefore(feedbackMessage, loginForm);

        function showFeedback(message, isError = true) {
            feedbackMessage.textContent = message;
            feedbackMessage.style.display = 'block';
            feedbackMessage.style.color = isError ? '#e11d48' : '#16a34a';
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log('المستخدم مسجل الدخول سابقاً:', user.email);
                window.location.href = 'index.html';
            }
        });

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            feedbackMessage.style.display = 'none';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('remember').checked;
            const persistence = rememberMe ? browserLocalPersistence : browserSessionPersistence;

            setPersistence(auth, persistence)
                .then(() => signInWithEmailAndPassword(auth, email, password))
                .then(() => {
                    showFeedback('تم تسجيل الدخول بنجاح! جاري التحويل...', false);
                    setTimeout(() => window.location.href = 'index.html', 900);
                })
                .catch((error) => {
                    const code = error.code || '';
                    let message = 'البريد الإلكتروني أو كلمة المرور غير صحيحة';

                    if (code === 'auth/user-not-found') message = 'المستخدم غير موجود. الرجاء التسجيل أولاً.';
                    if (code === 'auth/wrong-password') message = 'كلمة المرور غير صحيحة.';
                    if (code === 'auth/invalid-email') message = 'البريد الإلكتروني غير صالح.';

                    showFeedback(message, true);
                });
        });

        googleSignInBtn.addEventListener('click', function() {
            feedbackMessage.style.display = 'none';
            signInWithPopup(auth, googleProvider)
                .then((result) => {
                    showFeedback('تم تسجيل الدخول باستخدام Google بنجاح! جاري التحويل...', false);
                    setTimeout(() => window.location.href = 'index.html', 900);
                })
                .catch((error) => {
                    const message = error.message || 'فشل تسجيل الدخول عبر Google';
                    showFeedback(message, true);
                });
        });

        githubSignInBtn.addEventListener('click', function() {
            feedbackMessage.style.display = 'none';
            signInWithPopup(auth, githubProvider)
                .then((result) => {
                    showFeedback('تم تسجيل الدخول باستخدام GitHub بنجاح! جاري التحويل...', false);
                    setTimeout(() => window.location.href = 'index.html', 900);
                })
                .catch((error) => {
                    const message = error.message || 'فشل تسجيل الدخول عبر GitHub';
                    showFeedback(message, true);
                });
        });

        // إضافة حدث للرابط "نسيت؟"
        document.querySelector('.forgot-link').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = 'forgot-password.html';
        });
    </script>
</body>
</html>
